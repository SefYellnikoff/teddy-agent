<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teddy Agent - English Tutor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        overflow: hidden;
      }

      #app {
        width: 100%;
        height: 100vh;
      }

      :root {
        --primary: #667eea;
        --secondary: #764ba2;
        --accent: #ffd89b;
        --user-bubble: #e3f2fd;
        --teddy-bubble: #fff3e0;
        --teddy-icon: #ff9800;
        --success: #4caf50;
        --error: #f44336;
        --text-dark: #333;
        --text-light: #666;
        --border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
